name: dart_score_app
description: Professional darts scoring app with multi-platform support.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# ── App icon generation ───────────────────────────────────────────────────────
# Place a 1024×1024 PNG at assets/icon/icon.png, then run:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  ios: true
  android: false
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#121212"
    theme_color: "#E53935"

# ── Splash screen generation ──────────────────────────────────────────────────
# Place your splash logo PNG at assets/splash/splash.png, then run:
#   flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#121212"
  image: assets/splash/splash.png
  color_dark: "#121212"
  image_dark: assets/splash/splash.png
  ios: true
  android: false
  web: false
  fullscreen: true
  ios_content_mode: scaleAspectFit

flutter:
  uses-material-design: true
